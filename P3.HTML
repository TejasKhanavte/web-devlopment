<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<body>
    <h1>Registration Form</h1>
    <form>
    <br><label>Name:</label> <input type="text" name="name" required><br>
    <br><label>Email:</label> <input type="email" name="email" required><br>
    <br><label>Gender:</label required> 
   <br> <input type="radio" name="g" value="m"> Male 
    <br><input type="radio" name="g" value="f"> Female<br>
   <br> <label>DOB:</label> <input type="date" name="dob" required><br>
   <br> <button type="submit">Submit</button>
</form>
</body>
</html>
